version: '3.8'

services:
  cashbox-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cashbox_sql_server
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=CashboxPassword123*
    ports:
      - "1433:1433"
    volumes:
      - cashbox_db_data:/var/opt/mssql

volumes:
  cashbox_db_data: